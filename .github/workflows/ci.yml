name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # fontconfig is linked via dlopen at runtime (bobo's recipe); no dev
  # headers needed at build time on any platform.
  RUST_FONTCONFIG_DLOPEN: "on"
  FONTCONFIG_NO_PKG_CONFIG: "1"
  RUSTFLAGS: -D warnings

jobs:
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Clippy (kobo feature)
        run: cargo clippy --workspace --all-targets --features gideon-app/kobo -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace
      - name: Run tests (kobo feature)
        run: cargo test --workspace --features gideon-app/kobo

  smoke:
    name: CLI smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace
      - name: Generate a CBZ fixture and exercise the CLI
        run: |
          python3 ci/make_fixture.py /tmp/manga
          ./target/debug/gideon info "/tmp/manga/Sample Manga/vol1.cbz"
          ./target/debug/gideon render "/tmp/manga/Sample Manga/vol1.cbz" -p 2 -o /tmp/page2.png --width 300 --height 400
          test -s /tmp/page2.png
          ./target/debug/gideon library /tmp/manga
          printf 'n\nq\n' | ./target/debug/gideon read "/tmp/manga/Sample Manga/vol1.cbz"
          ./target/debug/gideon library /tmp/manga | grep -F "(page 2/3)"

  installer:
    name: Installer tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck installer/install.sh ci/installer_test.sh ci/qemu_integration.sh
      - name: Run installer test suite
        run: ./ci/installer_test.sh

  kobo-cross:
    name: Cross-check (Kobo armv7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-musleabihf
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build for Kobo target (full build catches link errors)
        run: cross build --release --features gideon-app/kobo --target armv7-unknown-linux-musleabihf
