name: Release

# Semantic-versioned releases, driven by tags. Pushing a tag like v0.2.0
# (created with scripts/release.sh) runs the full test gate, builds the
# QEMU-verified Kobo bundle and publishes a GitHub Release with the
# versioned zip attached. The tag must match the workspace version in
# Cargo.toml or the release fails before building anything.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "tag $GITHUB_REF_NAME does not match Cargo.toml version $cargo_version" >&2
            echo "bump the version with scripts/release.sh before tagging" >&2
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: armv7-unknown-linux-musleabihf
      - uses: Swatinem/rust-cache@v2
      - name: Install ARM cross toolchain and QEMU
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf qemu-user-static

      - name: Quality gate (fmt, clippy, tests, installer)
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
          ./ci/installer_test.sh

      - name: Build Kobo binaries (armv7)
        env:
          CC_armv7_unknown_linux_musleabihf: arm-linux-gnueabihf-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_MUSLEABIHF_LINKER: arm-linux-gnueabihf-gcc
        run: |
          cargo build --release --features gideon-app/kobo --target armv7-unknown-linux-musleabihf
          cp target/armv7-unknown-linux-musleabihf/release/gideon /tmp/gideon-kobo
          cargo build --release --target armv7-unknown-linux-musleabihf

      - name: Run QEMU integration tests against the release binaries
        run: ./ci/qemu_integration.sh /tmp/gideon-kobo target/armv7-unknown-linux-musleabihf/release/gideon

      - name: Assemble versioned bundle
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p "/tmp/gideon-kobo-v${version}"
          cp /tmp/gideon-kobo "/tmp/gideon-kobo-v${version}/gideon"
          cp installer/install.sh installer/nickelmenu-gideon installer/INSTALL.md "/tmp/gideon-kobo-v${version}/"
          chmod 755 "/tmp/gideon-kobo-v${version}/install.sh" "/tmp/gideon-kobo-v${version}/gideon"
          echo "gideon ${version} (${GITHUB_SHA::9})" > "/tmp/gideon-kobo-v${version}/VERSION"
          (cd /tmp && zip -r "gideon-kobo-v${version}.zip" "gideon-kobo-v${version}")

      - name: Smoke-test the bundle installer
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p /tmp/fake-kobo/.kobo /tmp/fake-kobo/.adds/nm
          sh "/tmp/gideon-kobo-v${version}/install.sh" --root /tmp/fake-kobo
          grep -F "gideon ${version}" /tmp/fake-kobo/.adds/gideon/VERSION

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: gideon ${{ github.ref_name }}
          generate_release_notes: true
          files: /tmp/gideon-kobo-${{ github.ref_name }}.zip
